<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>LAYTH PRO MAX FINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#0f172a;color:#fff;padding:15px}
input,button,select{padding:10px;border-radius:8px;border:none;margin:5px}
button{cursor:pointer;background:#22c55e;color:#000;font-weight:bold}
.card{background:#1e293b;padding:12px;margin-top:10px;border-radius:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
h3{margin-top:20px}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs,
  deleteDoc, doc, updateDoc, setDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getAuth, GoogleAuthProvider,
  signInWithPopup, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 🔥 Firebase Config (تبعك)
const firebaseConfig = {
  apiKey: "...",
  authDomain: "layt2h-system.firebaseapp.com",
  projectId: "layt2h-system"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let user=null;

// ================= STATE =================
let state={
  stock:[],
  bills:[],
  cash:0
};

// ================= AUTH =================
window.login = async()=>{
  const res = await signInWithPopup(auth, provider);
  user = res.user;
};

onAuthStateChanged(auth,(u)=>{
  user=u;
  if(u){
    loadAll();
    listenCash();
  }
});

// ================= DB =================
const col = (name)=>collection(db,"users",user.uid,name);
const systemRef = ()=>doc(db,"users",user.uid,"system","main");

// ================= LOAD =================
async function loadAll(){
  await Promise.all([
    load("stock"),
    load("bills")
  ]);
  render();
}

async function load(name){
  const snap = await getDocs(col(name));
  state[name]=snap.docs.map(d=>({id:d.id,...d.data()}));
}

// ================= CASH REALTIME =================
function listenCash(){
  onSnapshot(systemRef(), (docSnap)=>{
    if(docSnap.exists()){
      state.cash = docSnap.data().cash || 0;
      render();
    }
  });
}

// ================= STOCK =================
window.addStock = async()=>{
  const name = stockName.value;
  const qty = Number(stockQty.value);
  const cost = Number(stockCost.value);
  const price = Number(stockPrice.value);

  if(!name) return alert("❌ ناقص");

  await addDoc(col("stock"),{name,qty,cost,price});
  load("stock").then(render);
};

// ================= CART =================
let cart=[];

window.addToCart = ()=>{
  const id = stockSelect.value;
  const item = state.stock.find(i=>i.id===id);

  if(!item || item.qty<=0) return alert("❌ نفذ");

  cart.push({...item, qtyBuy:1});
  renderCart();
};

function renderCart(){
  cartBox.innerHTML="";
  cart.forEach((i,idx)=>{
    cartBox.innerHTML+=`
      <div class="card">
        ${i.name} - ${i.price}
        <button onclick="removeItem(${idx})">❌</button>
      </div>
    `;
  });
}

window.removeItem = (i)=>{
  cart.splice(i,1);
  renderCart();
};

// ================= SAVE BILL =================
window.saveBill = async()=>{
  if(cart.length===0) return alert("❌ فاضي");

  let total=0;
  let profit=0;

  for(const i of cart){
    total += i.price * i.qtyBuy;
    profit += (i.price - i.cost) * i.qtyBuy;

    await updateDoc(doc(db,"users",user.uid,"stock",i.id),{
      qty: i.qty - i.qtyBuy
    });
  }

  await addDoc(col("bills"),{
    items: cart,
    total,
    profit,
    date: new Date().toISOString()
  });

  state.cash += total;
  await setDoc(systemRef(), {cash: state.cash});

  cart=[];
  loadAll();
};

// ================= DASH =================
function calc(){
  const sales = state.bills.reduce((a,b)=>a+b.total,0);
  const profit = state.bills.reduce((a,b)=>a+b.profit,0);
  return {sales,profit};
}

// ================= UI =================
function render(){
  const d = calc();

  dash.innerHTML=`
    💰 المبيعات: ${d.sales}<br>
    🧠 الربح: ${d.profit}<br>
    💵 الصندوق: ${state.cash}
  `;

  stockSelect.innerHTML="";
  state.stock.forEach(s=>{
    stockSelect.innerHTML+=`
      <option value="${s.id}">
        ${s.name} (${s.qty})
      </option>`;
  });

  billsBox.innerHTML="";
  state.bills.forEach(b=>{
    billsBox.innerHTML+=`
      <div class="card">
        💰 ${b.total} | 🧠 ${b.profit}
      </div>`;
  });
}

</script>
</head>

<body>

<h2>🔥 نظام الليث PRO MAX FINAL</h2>

<button onclick="login()">تسجيل دخول Google</button>

<h3>📊 Dashboard</h3>
<div id="dash"></div>

<hr>

<div class="grid">

<div>
<h3>📦 مخزون</h3>
<input id="stockName" placeholder="اسم">
<input id="stockQty" type="number" placeholder="كمية">
<input id="stockCost" type="number" placeholder="تكلفة">
<input id="stockPrice" type="number" placeholder="سعر بيع">
<button onclick="addStock()">إضافة</button>
</div>

<div>
<h3>🧾 فاتورة</h3>
<select id="stockSelect"></select>
<button onclick="addToCart()">➕</button>

<div id="cartBox"></div>

<button onclick="saveBill()">💾 حفظ الفاتورة</button>
</div>

</div>

<h3>📄 الفواتير</h3>
<div id="billsBox"></div>

</body>
</html>
